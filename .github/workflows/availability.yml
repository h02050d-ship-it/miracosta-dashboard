name: update-availability

on:
  schedule:
    - cron: "23 */2 * * *"   # 2時間ごと
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: availability
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch availability from Rakuten Travel API
        env:
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
        run: python scripts/fetch_availability.py
      - name: Commit availability.json
        run: |
          git config user.name "availability-bot"
          git config user.email "actions@github.com"
          git add availability.json
          git diff --cached --quiet && echo "no change" || git commit -m "update availability [skip ci]"
          git push
